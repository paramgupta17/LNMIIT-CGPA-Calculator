<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGPA Calculator — LNMIIT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f7f4ec;
    --grid:#ece5d3;
    --grid-major:#ddd2b3;
    --ink:#211f1a;
    --ink-soft:#726a58;
    --pen:#a8631e;
    --pen-soft:#f1dcb8;
    --navy:#1d2d50;
    --navy-text:var(--navy);
    --navy-deep:#0e1830;
    --gold:#b6912c;
    --good:#2f7d5b;
    --card-bg:#ffffff;
    --gauge-track:#ece5d3;
  }
  body.dark{
    --paper:#0c0e13;
    --grid:#181c26;
    --grid-major:#262c3a;
    --ink:#ede8da;
    --ink-soft:#9b9788;
    --pen:#e0a458;
    --pen-soft:#4a3520;
    --navy:#3f5992;
    --navy-text:#60a5fa;
    --navy-deep:#25406e;
    --gold:#d8b84a;
    --good:#4fae86;
    --card-bg:#141821;
    --gauge-track:#232a3a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'DM Sans',sans-serif;
    min-height:100vh;
    padding:32px 20px 80px;
    transition:background-color .25s, color .25s;
    position:relative;
  }
  body::before{content:""; position:fixed; width:560px; height:560px; border-radius:50%; background:rgba(182,145,44,.07); filter:blur(74px); top:-260px; right:-180px; pointer-events:none;}
  body::after{content:""; position:fixed; width:430px; height:430px; border-radius:50%; background:rgba(29,45,80,.07); filter:blur(74px); bottom:-230px; left:-120px; pointer-events:none;}
  .wrap{max-width:1120px;margin:0 auto; position:relative; z-index:1;}
  svg.icon{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:-3px;}

  /* Header */
  header{
    display:flex; flex-wrap:wrap; gap:28px;
    align-items:center; justify-content:space-between;
    border:1px solid var(--grid-major); border-radius:24px;
    padding:24px 26px; margin-bottom:22px; background:var(--card-bg);
    box-shadow:0 16px 42px rgba(31,35,67,.08);
  }
  .title-block{display:flex; gap:16px; align-items:center;}
  .logo-mark{
    flex:none; width:132px; height:68px; overflow:hidden;
    background:transparent;
  }
  .logo-mark img{display:block; width:100%; height:100%; object-fit:cover;}
  h1{font-family:'Space Grotesk',sans-serif; font-size:clamp(29px,4vw,42px); margin:0; font-weight:700; letter-spacing:-.045em;}
  .title-block p{margin:6px 0 0; color:var(--ink-soft); font-size:14.5px; max-width:46ch;}

  .gauge-box{
    min-width:380px; flex:1; display:flex; flex-direction:column; gap:14px;
    padding:24px 28px 28px; background:linear-gradient(135deg, var(--navy-deep), var(--navy));
    border:0; border-radius:20px; box-shadow:0 16px 32px rgba(14,24,48,.32);
    position:relative; overflow:hidden;
  }
  .gauge-box::after{
    content:""; position:absolute; width:190px; height:190px; border-radius:50%;
    background:var(--gold); opacity:.10; right:-60px; top:-90px; pointer-events:none;
  }
  .gauge-top{position:relative; z-index:1; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;}
  .gauge-top .label{font-family:'JetBrains Mono',monospace; font-size:13px; color:rgba(255,255,255,.92); text-transform:uppercase; letter-spacing:.14em; display:flex; align-items:center; gap:6px;}
  .gauge-top .sub{font-family:'JetBrains Mono',monospace; font-size:13px; color:rgba(255,255,255,.80);}
  .gauge-value-row{position:relative; z-index:1; display:flex; align-items:baseline; gap:8px;}
  .gauge-value-row .val{font-family:'Space Grotesk',sans-serif; font-size:58px; line-height:1; font-weight:700; color:var(--gold); letter-spacing:-.04em; text-shadow:0 2px 16px rgba(182,145,44,.35);}
  .gauge-value-row .val-max{font-family:'JetBrains Mono',monospace; font-size:16px; color:rgba(255,255,255,.62); font-weight:600;}
  .gauge-track-wrap{position:relative; z-index:1; margin-top:14px; padding:0 2px;}
  .gauge-track{position:relative; height:12px; border-radius:999px; background:rgba(255,255,255,.14);}
  .gauge-fill{position:absolute; left:0; top:0; bottom:0; width:0%; border-radius:inherit; background:linear-gradient(90deg, var(--gold), #f2df9e); box-shadow:0 0 14px rgba(182,145,44,.55); transition:width .5s cubic-bezier(.4,0,.2,1);}
  .gauge-thumb{
    position:absolute; top:50%; left:0%; width:20px; height:20px; border-radius:50%;
    background:#fff; border:3px solid var(--gold); transform:translate(-50%,-50%);
    box-shadow:0 2px 10px rgba(0,0,0,.35); transition:left .5s cubic-bezier(.4,0,.2,1); z-index:2;
  }
  .gauge-thumb-tip{
    position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%);
    background:#fff; color:var(--navy-deep); font-family:'JetBrains Mono',monospace;
    font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px; white-space:nowrap;
    box-shadow:0 6px 14px rgba(0,0,0,.28);
  }
  .gauge-thumb-tip::after{content:""; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:4px solid transparent; border-top-color:#fff;}
  .gauge-ticks{display:flex; justify-content:space-between; margin-top:9px; font-family:'JetBrains Mono',monospace; font-size:10px; color:rgba(255,255,255,.4);}
  .theme-toggle{
    position:fixed; top:20px; right:20px; z-index:50;
    width:46px; height:46px; border-radius:50%; border:1px solid var(--grid-major);
    background:var(--card-bg); color:var(--ink); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 20px rgba(31,35,67,.12);
    transition:background .15s, transform .1s;
  }
  .theme-toggle:hover{background:var(--navy); color:#fff; transform:translateY(-2px);}
  .theme-toggle:active{transform:scale(.94);}
  .theme-toggle svg{width:19px;height:19px;}

  @media (max-width:720px){
    body{padding:22px 14px 56px;}
    header{gap:18px;}
    .title-block{gap:12px;}
    .logo-mark{width:110px; height:57px;}
    .gauge-box{width:100%; min-width:0;}
  }
  @media (max-width:430px){
    .title-block{display:block;}
    .logo-mark{margin-bottom:12px;}
    .gauge-value-row .val{font-size:44px;}
  }

  @media (max-width:640px){
    body{padding:16px 12px 42px;}
    header{padding:17px; gap:16px; border-radius:18px;}
    .title-block{width:100%; gap:11px; align-items:center;}
    .logo-mark{width:104px; height:54px;}
    h1{font-size:clamp(25px,7.6vw,33px); line-height:1.05;}
    .gauge-box{width:100%; min-width:0; padding:18px 18px 22px; gap:11px; border-radius:15px;}
    .gauge-value-row .val{font-size:42px;}
    .gauge-top .label{font-size:9px;}
    .branch-tabs{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:6px; padding:6px; border-radius:14px;}
    .branch-tab{justify-content:center; padding:11px 8px;}
    details.scale{padding:2px 14px; border-radius:14px;}
    .scale-grid{grid-template-columns:repeat(4,minmax(0,1fr)); gap:7px;}
    .semester{border-radius:15px; margin-bottom:13px;}
    .semester-head{padding:14px 15px; min-height:54px;}
    .semester-head .sname{font-size:15px;}
    .semester-head .sgpa{font-size:11px;}
    .semester-head .chev{display:none;}
    .semester-body{padding:0;}
    table, tbody{display:block;}
    thead{display:none;}
    tbody tr{
      display:grid; grid-template-columns:minmax(0,1fr) auto; gap:10px 12px;
      padding:15px; border-bottom:1px solid var(--grid); background:var(--card-bg);
    }
    tbody tr:last-child{border-bottom:0;}
    tbody td{padding:0; border:0; min-width:0;}
    tbody td:nth-child(1){grid-column:2; grid-row:1; align-self:center;}
    tbody td:nth-child(2){grid-column:1; grid-row:1; align-self:center;}
    tbody td:nth-child(3){grid-column:1 / -1; grid-row:2; color:var(--ink); font-size:14px; line-height:1.35;}
    tbody td:nth-child(4){grid-column:1; grid-row:3; display:flex; align-items:center; gap:8px;}
    tbody td:nth-child(5){grid-column:2; grid-row:3; display:flex; align-items:center; justify-content:flex-end; gap:8px;}
    tbody td:nth-child(4)::before, tbody td:nth-child(5)::before{font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft);}
    tbody td:nth-child(4)::before{content:'Credits';}
    tbody td:nth-child(5)::before{content:'Grade';}
    .credits-input{width:50px;}
    select.grade{min-width:76px;}
    .semester-foot{justify-content:space-between; padding:10px 14px; gap:6px;}
    .semester-foot span{padding:5px 7px; font-size:10.5px;}
    .sem8-options{grid-template-columns:1fr; padding:14px 15px 3px;}
    footer{align-items:flex-start;}
  }

  @media (max-width:380px){
    .title-block{align-items:flex-start;}
    .logo-mark{width:96px; height:50px;}
    h1{font-size:27px;}
    .gauge-value-row .val{font-size:36px;}
    .semester-foot{flex-wrap:wrap; justify-content:flex-start;}
  }

  /* Branch tabs */
  .branch-tabs{
    display:flex; gap:7px; margin-bottom:22px; flex-wrap:wrap; padding:7px;
    border:1px solid var(--grid-major); border-radius:16px; background:var(--card-bg);
    box-shadow:0 10px 28px rgba(31,35,67,.05);
  }
  .branch-tab{
    font-family:'JetBrains Mono',monospace; font-weight:600; font-size:15px;
    padding:12px 20px 12px 16px; border:1px solid transparent; background:transparent;
    cursor:pointer; color:var(--ink-soft); border-radius:8px;
    transition:background .18s, color .18s, transform .15s, box-shadow .18s;
    display:flex; align-items:center; gap:8px;
  }
  .branch-tab:active{transform:scale(.97);}
  .branch-tab.active{background:linear-gradient(135deg, var(--navy-deep), var(--navy)); color:#fff; border-color:var(--navy); box-shadow:0 6px 14px rgba(98,87,232,.28);}
  .branch-tab:hover:not(.active){background:var(--grid); color:var(--navy-text);}
  .branch-tab svg{width:17px;height:17px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round;}

  /* Scale panel */
  details.scale{
    border:1px solid var(--grid-major); border-radius:16px; padding:2px 18px;
    margin-bottom:26px; background:var(--card-bg); box-shadow:0 10px 28px rgba(31,35,67,.05);
  }
  details.scale > summary{
    cursor:pointer; padding:10px 0; font-family:'JetBrains Mono',monospace;
    font-size:12.5px; font-weight:600; color:var(--navy-text); list-style:none;
    display:flex; align-items:center; gap:8px;
  }
  details.scale > summary::-webkit-details-marker{display:none;}
  details.scale > summary .chevsm{transition:transform .15s;}
  details.scale[open] > summary .chevsm{transform:rotate(90deg);}
  .scale-grid{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
    gap:10px; padding:6px 0 16px;
  }
  .scale-item{display:flex; flex-direction:column; gap:5px; align-items:center;
    border:1px solid var(--grid-major); border-radius:10px; padding:10px 4px; background:var(--paper);}
  .scale-item label{font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; color:var(--navy-text);}
  .scale-item input{width:48px; text-align:center; border:1px solid var(--grid-major); border-radius:7px; padding:4px; background:var(--card-bg); color:var(--ink); font-family:'JetBrains Mono',monospace; font-size:13px;}

  /* Semester cards */
  .semester{
    background:var(--card-bg); border:1px solid var(--grid-major); border-radius:18px;
    margin-bottom:18px; overflow:hidden; box-shadow:0 10px 28px rgba(31,35,67,.06);
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .semester:hover{transform:translateY(-2px); box-shadow:0 16px 32px rgba(31,35,67,.11);}
  .semester-head{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:16px 20px; background:linear-gradient(120deg, var(--navy-deep), var(--navy)); color:#fff; cursor:pointer;
    user-select:none;
  }
  .semester-head .sname{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:16px; display:flex; align-items:center; gap:9px;}
  .semester-head .sgpa{font-family:'JetBrains Mono',monospace; font-size:13px; opacity:.9;}
  .semester-head .chev{transition:transform .18s; display:flex;}
  .semester.collapsed .chev{transform:rotate(-90deg);}
  .semester-body{padding:6px 0;}
  .semester.collapsed .semester-body{display:none;}

  table{width:100%; border-collapse:collapse;}
  thead th{
    font-family:'JetBrains Mono',monospace; font-size:11px; text-transform:uppercase;
    letter-spacing:.08em; color:var(--ink-soft); text-align:left; padding:11px 20px; background:var(--paper);
    border-bottom:1px solid var(--grid-major);
  }
  tbody td{padding:12px 20px; border-bottom:1px solid var(--grid); font-size:14px; vertical-align:middle;}
  tbody tr{transition:background .15s;}
  tbody tr:hover{background:color-mix(in srgb, var(--navy) 4%, transparent);}
  tbody tr:last-child td{border-bottom:none;}
  tr.row-excluded{opacity:.42;}
  .row-check{width:16px; height:16px; accent-color:var(--navy); cursor:pointer;}
  .code{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:12px; color:var(--navy-text); background:color-mix(in srgb, var(--navy-text) 12%, transparent); padding:4px 6px; border-radius:6px;}
  .cname-input{
    border:none; background:transparent; font-size:14px; font-family:'Inter',sans-serif;
    width:100%; padding:4px 2px; border-radius:4px; color:var(--ink);
  }
  .cname-input:focus{outline:1.5px solid var(--navy); background:var(--card-bg);}
  .credits-input{
    width:52px; text-align:center; font-family:'JetBrains Mono',monospace; font-size:13px;
    border:1px solid var(--grid-major); border-radius:7px; padding:6px 2px; background:var(--card-bg); color:var(--ink);
  }
  select.grade{
    font-family:'JetBrains Mono',monospace; font-weight:600; font-size:13px;
    padding:7px 9px; border:1px solid var(--grid-major); border-radius:8px; background:var(--card-bg);
    color:var(--pen); min-width:78px; box-shadow:0 2px 5px rgba(23,50,87,.06);
  }

  .semester-foot{
    display:flex; justify-content:flex-end; gap:10px; padding:12px 18px;
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-soft); background:var(--paper);
  }
  .semester-foot span{padding:5px 9px; border-radius:999px; background:var(--card-bg); border:1px solid var(--grid-major);}
  .semester-foot b{color:var(--navy-text);}

  .sem8-options{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
    gap:10px; padding:16px 18px 4px;
  }
  .sem8-opt-btn{
    text-align:left; border:1px solid var(--grid-major); background:var(--card-bg);
    border-radius:12px; padding:14px; cursor:pointer; display:flex;
    flex-direction:column; gap:4px; transition:border-color .15s, background .15s, opacity .15s, transform .15s, box-shadow .15s;
  }
  .sem8-opt-btn .opt-num{
    font-family:'JetBrains Mono',monospace; font-size:10.5px; text-transform:uppercase;
    letter-spacing:.06em; color:var(--ink-soft); font-weight:600;
  }
  .sem8-opt-btn .opt-label{font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600; color:var(--ink);}
  .sem8-opt-btn:hover{border-color:var(--navy); transform:translateY(-2px); box-shadow:0 6px 13px rgba(23,50,87,.09);}
  .sem8-opt-btn.sel{border-color:var(--navy); background:linear-gradient(120deg, var(--navy-deep), var(--navy)); color:#fff; box-shadow:0 7px 14px rgba(11,111,176,.22);}
  body.dark .sem8-opt-btn.sel .opt-label{color:#fff;}
  .sem8-opt-btn.sel .opt-label{color:#fff;}
  .sem8-opt-btn.sel .opt-num{color:rgba(255,255,255,.65);}

  footer{
    margin-top:36px; padding:18px 0; border-top:1px solid var(--grid-major);
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;
  }
  .foot-note{font-size:12.5px; color:var(--ink-soft); max-width:56ch; display:flex; gap:8px; align-items:flex-start;}
  .reset-btn{
    font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600;
    background:transparent; border:1px solid var(--pen); color:var(--pen);
    padding:10px 15px; border-radius:9px; cursor:pointer;
    display:flex; align-items:center; gap:6px;
  }
  .reset-btn:hover{background:var(--pen); color:#fff;}
  .save-flag{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--good); opacity:0; transition:opacity .3s; display:flex; align-items:center; gap:4px;}
  .save-flag.show{opacity:1;}
</style>
</head>
<body>
<button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
  <svg class="icon" viewBox="0 0 24 24" id="themeIconSun"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  <svg class="icon" viewBox="0 0 24 24" id="themeIconMoon" style="display:none;"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
</button>
<div class="wrap">

  <header>
    <div class="title-block">
      <div class="logo-mark"><img src="lnmiit-logo-transparent.png" alt="LNMIIT logo"></div>
      <div>
        <h1>CGPA Calculator</h1>
        <p>Calculate your SGPA and CGPA effortlessly.</p>
      </div>
    </div>
    <div class="gauge-box">
      <div class="gauge-top">
        <span class="label"><svg class="icon" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>Overall CGPA</span>
        <span class="sub" id="creditsVal">0 credits counted</span>
      </div>
      <div class="gauge-value-row">
        <span class="val" id="cgpaVal">—</span><span class="val-max">/ 10</span>
      </div>
      <div class="gauge-track-wrap">
        <div class="gauge-track">
          <div class="gauge-fill" id="gaugeFill"></div>
          <div class="gauge-thumb" id="gaugeThumb"><span class="gauge-thumb-tip" id="gaugeThumbTip">0.00</span></div>
        </div>
        <div class="gauge-ticks"><span>0</span><span>2</span><span>4</span><span>6</span><span>8</span><span>10</span></div>
      </div>
    </div>
  </header>

  <div class="branch-tabs" id="branchTabs"></div>

  <details class="scale">
    <summary><svg class="icon chevsm" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg><svg class="icon" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Grading scale (edit if your official scale differs)</summary>
    <div class="scale-grid" id="scaleGrid"></div>
  </details>

  <div id="semesters"></div>

  <footer>
    <div class="foot-note"><svg class="icon" viewBox="0 0 24 24" style="flex:none;margin-top:1px;"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>Your entries are saved automatically to this browser.</div>
    <div style="display:flex; align-items:center; gap:12px;">
      <span class="save-flag" id="saveFlag"><svg class="icon" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>saved</span>
      <button class="reset-btn" id="resetBtn"><svg class="icon" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>Reset this branch</button>
    </div>
  </footer>

</div>

<script>
const EXCLUDED_CODES = new Set(["HS112","ME121","HS221"]);

const BRANCH_ICONS = {
  CSE: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/><line x1="12" y1="4" x2="12" y2="20"/></svg>',

const el = id => document.getElementById(id);
let saveTimer = null;
const STORAGE_KEY = "cgpa-ledger-state-v2";
const THEME_KEY = "cgpa-ledger-theme";

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      state = Object.assign(state, parsed);
      const currentLabels = DEFAULT_SCALE.map(s=>s[0]).sort().join(",");
      const savedLabels = Object.keys(state.scale||{}).sort().join(",");
      if(savedLabels !== currentLabels){
        state.scale = Object.fromEntries(DEFAULT_SCALE);
      }
    }
    if(state.collapseDefaultsVersion !== 1){
      Object.keys(DATA).forEach(branch=>{
        for(let sIdx=0; sIdx<8; sIdx++){
          state.collapsed[branch+"-"+sIdx] = sIdx > 0;
        }
      });
      state.collapseDefaultsVersion = 1;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
  }catch(e){ console.error("load failed", e); }
}

function queueSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveNow, 300);
}

function saveNow(){
  const flag = el("saveFlag");
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    flag.classList.remove("failed");
    flag.innerHTML = `<svg class="icon" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>saved`;
    flag.classList.add("show");
    setTimeout(()=>flag.classList.remove("show"), 1200);
  }catch(e){
    console.error("save failed", e);
    flag.classList.add("show","failed");
    flag.innerHTML = `<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v5"/><path d="M12 16h.01"/></svg>save failed`;
  }
}

function loadTheme(){
  let theme = "light";
  try{ theme = localStorage.getItem(THEME_KEY) || "light"; }catch(e){}
  applyTheme(theme);
}
function applyTheme(theme){
  document.body.classList.toggle("dark", theme === "dark");
  el("themeIconSun").style.display = theme === "dark" ? "none" : "block";
  el("themeIconMoon").style.display = theme === "dark" ? "block" : "none";
  try{ localStorage.setItem(THEME_KEY, theme); }catch(e){}
}
el("themeToggle").addEventListener("click", ()=>{
  const isDark = document.body.classList.contains("dark");
  applyTheme(isDark ? "light" : "dark");
});

function renderScale(){
  const grid = el("scaleGrid");
  grid.innerHTML = "";
  DEFAULT_SCALE.forEach(([label])=>{
    const val = state.scale[label] ?? Object.fromEntries(DEFAULT_SCALE)[label];
    const wrap = document.createElement("div");
    wrap.className = "scale-item";
    wrap.innerHTML = `<label>${label}</label><input type="number" step="0.5" min="0" max="10" value="${val}">`;
    wrap.querySelector("input").addEventListener("input", (e)=>{
      state.scale[label] = parseFloat(e.target.value) || 0;
      queueSave(); computeAndPaint();
    });
    grid.appendChild(wrap);
  });
}

function branchKey(){ return state.branch; }
function gradeKey(code){ return branchKey()+"::"+code; }

function buildSubjectRow(code, name, credits, gKey, onGradeSet){
  const nameVal = state.names[gKey] ?? name;
  const creditVal = state.credits[gKey] ?? credits;
  const gradeVal = state.grades[gKey] ?? "";
  const includedVal = state.included[gKey] !== false;

  const tr = document.createElement("tr");
  if(!includedVal) tr.classList.add("row-excluded");

  const tdCheck = document.createElement("td");
  const checkbox = document.createElement("input");
  checkbox.type = "checkbox";
  checkbox.className = "row-check";
  checkbox.checked = includedVal;
  checkbox.title = "Include in SGPA/CGPA";
  checkbox.addEventListener("change", e=>{
    state.included[gKey] = e.target.checked;
    tr.classList.toggle("row-excluded", !e.target.checked);
    queueSave(); computeAndPaint();
  });
  tdCheck.appendChild(checkbox);
  tr.appendChild(tdCheck);

  const tdCode = document.createElement("td");
  tdCode.innerHTML = `<span class="code">${code}</span>`;
  tr.appendChild(tdCode);

  const tdName = document.createElement("td");
  tdName.textContent = nameVal;
  tr.appendChild(tdName);

  const tdCred = document.createElement("td");
  const credInput = document.createElement("input");
  credInput.type = "number"; credInput.step="0.5"; credInput.min="0";
  credInput.className = "credits-input";
  credInput.value = creditVal;
  credInput.addEventListener("input", e=>{
    state.credits[gKey] = parseFloat(e.target.value) || 0;
    queueSave(); computeAndPaint();
  });
  tdCred.appendChild(credInput);
  tr.appendChild(tdCred);

  const tdGrade = document.createElement("td");
  const sel = document.createElement("select");
  sel.className = "grade";
  let opts = `<option value="">—</option>`;
  DEFAULT_SCALE.forEach(([label])=>{ opts += `<option value="${label}" ${gradeVal===label?"selected":""}>${label}</option>`; });
  sel.innerHTML = opts;
  sel.addEventListener("change", e=>{
    const val = e.target.value;
    if(val && onGradeSet) onGradeSet();
    state.grades[gKey] = val;
    queueSave(); computeAndPaint();
  });
  tdGrade.appendChild(sel);
  tr.appendChild(tdGrade);

  return tr;
}

function renderSemesters(){
  const container = el("semesters");

  semesters.forEach((subjects, sIdx)=>{
    const visible = subjects.filter(s=>!EXCLUDED_CODES.has(s[0]));
    const collapseKey = state.branch+"-"+sIdx;
    const isCollapsed = state.collapsed[collapseKey] ?? (sIdx > 0);

    const card = document.createElement("div");
    card.className = "semester" + (isCollapsed ? " collapsed":"");

    const head = document.createElement("div");
    head.className = "semester-head";
    head.innerHTML = `<span class="sname"><svg class="icon" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Semester ${sIdx+1}</span><span style="display:flex;align-items:center;gap:14px;"><span class="sgpa" data-sgpa="${sIdx}">SGPA —</span><span class="chev"><svg class="icon" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg></span></span>`;
    head.onclick = ()=>{
      state.collapsed[collapseKey] = !card.classList.contains("collapsed");
      queueSave();
      card.classList.toggle("collapsed");
    };
    card.appendChild(head);

    const body = document.createElement("div");
    body.className = "semester-body";

    const table = document.createElement("table");
    table.innerHTML = `<thead><tr><th style="width:34px;"></th><th style="width:90px;">Code</th><th>Course</th><th style="width:90px;">Credits</th><th style="width:120px;">Grade</th></tr></thead>`;

    visible.forEach(([code, name, type, credits])=>{
      tbody.appendChild(buildSubjectRow(code, name, credits, gradeKey(code)));

    table.appendChild(tbody);

    const foot = document.createElement("div");
    foot.className = "semester-foot";
    foot.innerHTML = `<span>Credits counted: <b data-scred="${sIdx}">0</b></span><span>SGPA: <b data-sgpafoot="${sIdx}">—</b></span>`;
    body.appendChild(foot);

    card.appendChild(body);
    container.appendChild(card);
  });

  renderSemester8(container);
}

function renderSemester8(container){
  const sIdx = 7;
  const selected = state.sem8Option[state.branch];
  const collapseKey = state.branch+"-"+sIdx;
  const isCollapsed = state.collapsed[collapseKey] ?? true;

  const card = document.createElement("div");
  card.className = "semester" + (isCollapsed ? " collapsed":"");

  const head = document.createElement("div");
  head.className = "semester-head";
  head.innerHTML = `<span class="sname"><svg class="icon" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Semester 8</span><span style="display:flex;align-items:center;gap:14px;"><span class="sgpa" data-sgpa="${sIdx}">SGPA —</span><span class="chev"><svg class="icon" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg></span></span>`;
  head.onclick = ()=>{
    state.collapsed[collapseKey] = !card.classList.contains("collapsed");
    queueSave();
    card.classList.toggle("collapsed");
  };
  card.appendChild(head);

  const body = document.createElement("div");
  body.className = "semester-body";

  const optionBar = document.createElement("div");
  optionBar.className = "sem8-options";
  Object.entries(SEM8_OPTIONS).forEach(([num, opt])=>{
    const btn = document.createElement("button");
    const isSel = selected === num;
    btn.type = "button";
    btn.className = "sem8-opt-btn" + (isSel ? " sel":"");
    btn.innerHTML = `<span class="opt-num">Option ${num}</span><span class="opt-label">${opt.label}</span>`;
    btn.onclick = ()=>{
      state.sem8Option[state.branch] = isSel ? null : num;
      queueSave(); renderAll();
    };
    optionBar.appendChild(btn);
  });
  body.appendChild(optionBar);

  if(selected){
    const clearOtherOptions = ()=>{
      Object.entries(SEM8_OPTIONS).forEach(([num, opt])=>{
        if(num === selected) return;
        opt.subjects.forEach(([code])=>{
          const gKey = gradeKey(code);
          delete state.grades[gKey];
          delete state.credits[gKey];
          delete state.names[gKey];
        });
      });
    };
    const table = document.createElement("table");
    table.innerHTML = `<thead><tr><th style="width:34px;"></th><th style="width:90px;">Code</th><th>Course</th><th style="width:90px;">Credits</th><th style="width:120px;">Grade</th></tr></thead>`;
    const tbody = document.createElement("tbody");
    SEM8_OPTIONS[selected].subjects.forEach(([code, name, type, credits])=>{
      tbody.appendChild(buildSubjectRow(code, name, credits, gradeKey(code), clearOtherOptions));
    });
    table.appendChild(tbody);
    body.appendChild(table);
  }

  const foot = document.createElement("div");
  foot.className = "semester-foot";
  foot.innerHTML = `<span>Credits counted: <b data-scred="${sIdx}">0</b></span><span>SGPA: <b data-sgpafoot="${sIdx}">—</b></span>`;
  body.appendChild(foot);

  card.appendChild(body);
  container.appendChild(card);
}

function computeAndPaint(){
  const semesters = DATA[state.branch];
  let totalPoints = 0, totalCredits = 0;

  semesters.forEach((subjects, sIdx)=>{
    let semPoints = 0, semCredits = 0;
    subjects.forEach(([code])=>{
      if(EXCLUDED_CODES.has(code)) return;
      const gKey = gradeKey(code);
      if(state.included[gKey] === false) return;
      const grade = state.grades[gKey];
      if(!grade) return;
      const credit = state.credits[gKey] ?? (DATA[state.branch][sIdx].find(s=>s[0]===code)[3]);
      const points = state.scale[grade] ?? Object.fromEntries(DEFAULT_SCALE)[grade];
      semPoints += credit * points;
      semCredits += credit;
    });
    totalPoints += semPoints;
    totalCredits += semCredits;
    paintSemesterFoot(sIdx, semPoints, semCredits);
  });

  // Semester 8 (option-based)
  const selected = state.sem8Option[state.branch];
  let s8Points = 0, s8Credits = 0;
  if(selected){
    SEM8_OPTIONS[selected].subjects.forEach(([code, , , defCredits])=>{
      const gKey = gradeKey(code);
      if(state.included[gKey] === false) return;
      const grade = state.grades[gKey];
      if(!grade) return;
      const credit = state.credits[gKey] ?? defCredits;
      const points = state.scale[grade] ?? Object.fromEntries(DEFAULT_SCALE)[grade];
      s8Points += credit * points;
      s8Credits += credit;
    });
  }
  totalPoints += s8Points;
  totalCredits += s8Credits;
  paintSemesterFoot(7, s8Points, s8Credits);

  const cgpa = totalCredits ? (totalPoints/totalCredits) : null;
  el("cgpaVal").textContent = cgpa!==null ? cgpa.toFixed(2) : "—";
  el("creditsVal").textContent = totalCredits + " credits counted";

  const pct = cgpa!==null ? Math.min(cgpa/10, 1) : 0;
  el("gaugeFill").style.width = (pct * 100).toFixed(1) + "%";
  el("gaugeThumb").style.left = (pct * 100).toFixed(1) + "%";
  el("gaugeThumbTip").textContent = cgpa!==null ? cgpa.toFixed(2) : "0.00";
}

function paintSemesterFoot(sIdx, semPoints, semCredits){
  const sgpa = semCredits ? (semPoints/semCredits) : null;
  const sgpaStr = sgpa!==null ? sgpa.toFixed(2) : "—";
  const sgpaEl = document.querySelector(`[data-sgpa="${sIdx}"]`);
  if(sgpaEl) sgpaEl.textContent = "SGPA " + sgpaStr;
  const sgpaFoot = document.querySelector(`[data-sgpafoot="${sIdx}"]`);
  if(sgpaFoot) sgpaFoot.textContent = sgpaStr;
  const scredEl = document.querySelector(`[data-scred="${sIdx}"]`);
  if(scredEl) scredEl.textContent = semCredits;
}

function renderAll(){
  renderBranchTabs();
  renderScale();
  renderSemesters();
  computeAndPaint();
}

el("resetBtn").addEventListener("click", ()=>{
  if(!confirm("Clear all entered grades for "+state.branch+"?")) return;
  Object.keys(state.grades).forEach(k=>{ if(k.startsWith(state.branch+"::")) delete state.grades[k]; });
  Object.keys(state.names).forEach(k=>{ if(k.startsWith(state.branch+"::")) delete state.names[k]; });
  Object.keys(state.credits).forEach(k=>{ if(k.startsWith(state.branch+"::")) delete state.credits[k]; });
  Object.keys(state.included).forEach(k=>{ if(k.startsWith(state.branch+"::")) delete state.included[k]; });
  delete state.sem8Option[state.branch];
  queueSave();
  renderAll();
});

loadTheme();
loadState();
renderAll();
</script>
</body>
</html>
